name: Build and Publish APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION_NAME=$(grep -E 'versionName\s*=\s*"[^"]+"' app/build.gradle.kts | head -n 1 | sed -E 's/.*versionName\s*=\s*"([^"]+)".*/\1/')
            if [[ -z "${VERSION_NAME}" ]]; then
              echo "Unable to determine versionName from app/build.gradle.kts"
              exit 1
            fi
            RELEASE_TAG="v${VERSION_NAME}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for key in SIGNING_KEYSTORE_BASE64 SIGNING_STORE_PASSWORD SIGNING_KEY_ALIAS SIGNING_KEY_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "Missing secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more signing secrets are missing. Configure repository secrets before running this workflow."
            exit 1
          fi
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Prepare keystore and signing config
        shell: bash
        run: |
          set -euo pipefail
          CLEAN_KEYSTORE_BASE64=$(printf '%s' "$SIGNING_KEYSTORE_BASE64" | tr -d '\r\n[:space:]')
          if [[ -z "$CLEAN_KEYSTORE_BASE64" || "$CLEAN_KEYSTORE_BASE64" == "PASTE_BASE64_KEYSTORE_HERE" || "$CLEAN_KEYSTORE_BASE64" == SIGNING_KEYSTORE_BASE64=* ]]; then
            echo "SIGNING_KEYSTORE_BASE64 is not set to a valid base64-encoded keystore. Replace the GitHub secret with the exact output of:"
            echo "base64 -w 0 app/release.keystore"
            exit 1
          fi

          printf '%s' "$CLEAN_KEYSTORE_BASE64" | base64 --decode > app/release.keystore
          {
            echo "storeFile=release.keystore"
            echo "storePassword=${SIGNING_STORE_PASSWORD}"
            echo "keyAlias=${SIGNING_KEY_ALIAS}"
            echo "keyPassword=${SIGNING_KEY_PASSWORD}"
          } > app/keystore.properties
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Generate checksum
        id: checksum
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in release output directory."
            exit 1
          fi
          SHA=$(sha256sum "$APK_PATH" | awk '{print $1}')
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.release_tag }}
          name: PocketBudget ${{ steps.release_tag.outputs.release_tag }}
          files: ${{ steps.checksum.outputs.apk_path }}
          body: |
            Android release build for PocketBudget.

            SHA-256: `${{ steps.checksum.outputs.sha256 }}`

      - name: Cleanup signing files
        if: always()
        run: rm -f app/keystore.properties app/release.keystore
