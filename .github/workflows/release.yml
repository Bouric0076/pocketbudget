name: Build and Release APK

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      
      - name: Create keystore.properties
        run: |
          echo "storeFile=release.keystore" > app/keystore.properties
          echo "storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}" >> app/keystore.properties
          echo "keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}" >> app/keystore.properties
          echo "keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}" >> app/keystore.properties
      
      - name: Decode and save keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
      
      - name: Build release APK
        run: ./gradlew assembleRelease
      
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
